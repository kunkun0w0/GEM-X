name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install linters
        run: pip install ruff==0.9.7 black==24.10.0
      - name: Run ruff
        run: ruff check .
      - name: Run black
        run: black --check .
