# @package _global_
defaults:
  - train
  - override /exp: gem_soma_regression
  - _self_

# Demo runs inference only.
task: test
use_wandb: false
debug: false

# Input/output
video_name: ???
video_path: ???
output_root: outputs/demo_soma
output_dir: ${output_root}/${video_name}
preprocess_dir: ${output_dir}/preprocess

# Demo options
static_cam: false
verbose: false
render_mhr: false
max_frames: -1
detector_name: vitdet

# Optional explicit checkpoint for demo loading.
ckpt_path: null
sam3d_ckpt_path: null
sam3d_mhr_path: null

paths:
  bbx: ${preprocess_dir}/bbx.pt
  vitpose: ${preprocess_dir}/vitpose.pt
  vit_features: ${preprocess_dir}/vit_features.pt
  slam: ${preprocess_dir}/camera.pt
  hpe_results: ${output_dir}/hpe_results.pt
  incam_video: ${output_dir}/${video_name}_1_incam.mp4
  global_video: ${output_dir}/${video_name}_2_global.mp4
  incam_global_horiz_video: ${output_dir}/${video_name}_3_incam_global_horiz.mp4
