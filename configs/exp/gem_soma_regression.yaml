# @package _global_
defaults:
  - /diffusion@model_cfg.diffusion: ddim
  - override /data: mocap/trainX_testY
  - override /model: gem
  - override /network: diffusion
  - override /pipeline: regression_only
  - override /endecoder: v2_soma_local_cam
  - override /optimizer: adamw_2e-4
  - override /scheduler: iters_half_30k_50k
  - override /train_datasets:
      - metrosim_dh_train
      - metrosim_dh_mocap
  - override /test_datasets:
      - metrosim_dh_val_transl_clean
  - override /callbacks:
      - ckpt_saver/every10000s_top100
      - prog_bar/prog_reporter_ed1
      - train_speed_timer/base
      - lr_monitor/pl
      - metric/metric_metrosim_both
  - _self_

exp_name_base: ${hydra:runtime.choices.exp}
exp_name_var: ""
exp_name: ${exp_name_base}_${exp_name_var}
data_name: gem_mixed

multicond_args: null

pl_trainer:
  precision: 16-mixed
  log_every_n_steps: 10
  gradient_clip_val: 0.5
  max_epochs: null
  check_val_every_n_epoch: null
  val_check_interval: 3000
  max_steps: 500000
  devices: 1
  strategy: ddp_find_unused_parameters_true

logger:
  _target_: pytorch_lightning.loggers.WandbLogger
  project: "gem"
  save_dir: "/tmp" # /save_dir/name/version/sub_dir
  name: ""
  version: ""
  resume: "allow"
  dir: "/tmp"
  id: null

use_wandb: true

model:
  model_cfg:
    body_model: soma

network:
  model_cfg:
    regression_only: true
    denoiser:
      args: ${pipeline.args}
      encode_text: false
      encoded_text_dim: 4096
      text_encoder_cfg:
        mode: none
        cross_attn_type: mha
      scale_params_dim: 69
      scale_comps_dim: 28
      fix_scale_comps: true

pipeline:
  args:
    remove_fingers: true
    extract_features: false
    weights:
      hand_factor: 0.05
      shape_loss: 0.0
